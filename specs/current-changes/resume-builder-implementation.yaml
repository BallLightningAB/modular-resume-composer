title: Resume builder implementation
status: completed
summary:
  - Implemented server-side YAML loading with data/private precedence and data/examples fallback.
  - Added local-first builder state, saved preset wrapper persistence, and last-used state restoration.
  - Replaced starter UI with builder, preview, and presets routes backed by TanStack Router search state.
  - Added root-level router error and not-found fallbacks plus tolerant block-item parsing for mixed YAML item shapes.
  - Expanded YAML version parsing so numeric `version` fields are accepted and normalized to strings.
  - Hardened YAML loading so malformed private files fall back to examples instead of crashing route resolution.
  - Polished the first working PDF prototype with denser strengths layout, print keep-together rules, a references module, and strengths-overlay composition.
completed:
  - Added public example dataset under data/examples for English demo usage.
  - Added loader helpers, builder utilities, search parsing, and local storage helpers.
  - Added semantic resume preview rendering and dedicated /preview and /presets routes.
  - Added `errorComponent` and `notFoundComponent` to the TanStack Router root route.
  - Relaxed block collection item parsing so object-shaped entries with `text` fields are normalized to strings.
  - Made `version` fields tolerant of either numbers or strings across resume YAML schemas.
  - Prevented malformed private YAML files from aborting resume data loading when a valid example file exists.
  - Added optional `references` module loading and preset support.
  - Merged selected overlay content into strengths with a cleaner print-focused layout.
  - Reordered presets so `stack` renders after `experience` and before `education`.
  - Added lightweight character-count hover hints to support modular layout budgeting.
  - Opened follow-up GitHub issue #2 for in-app module editing and issue #5 for future modular editing UI patterns.
remaining:
  - Browser print headers and footers still need to be disabled in the print dialog because they are not controlled by the app.
notes:
  source_strategy: data/private overrides matching files from data/examples.
  saved_preset_model: wrapper around PresetFile with UI-only section visibility state.
  route_strategy:
    - / handles the builder and live preview
    - /preview provides a cleaner print surface
    - /presets provides built-in and saved preset management
