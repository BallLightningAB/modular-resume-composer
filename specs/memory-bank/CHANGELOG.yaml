  - date: "2026-03-21"
    version: "0.0.5"
    issue: "https://github.com/BallLightningAB/modular-resume-composer/issues/5"
    commit: TBD
    status: completed
    title: "feat(editor): add local-first in-app resume module editing"
    details: |-
      - Added optional edited module payload persistence to saved presets and last-used builder state
      - Introduced a structured in-app editor for summaries, block modules, experience entries/bullets, and preset rule controls
      - Kept formatting and composition preset-driven while enabling limited manual overrides such as title line and section order
      - Added live validation messaging and preview section focus to surface fit feedback while editing
      - Updated the builder and preview routes so local draft edits compose immediately and persist through local state

      Refs: v0.0.5 #5 I5D1-I5D5
  - date: "2026-03-20"
    version: "0.0.4"
    issue: "https://github.com/BallLightningAB/modular-resume-composer/issues/3"
    commit: TBD
    status: completed
    title: "feat(preview): add template budgets, page guides, and Swedish resume datasets"
    details: |-
      - Added a shared section-budget model with estimated character limits for the current two-page template
      - Surfaced per-section `used/max` counters in the builder and resume preview to guide content fit
      - Added visible page-boundary guides to the live preview and dedicated print preview so the page cutoff is easier to understand before printing
      - Added complete Swedish example datasets for profile, modules, experience, overlays, references, and built-in presets
      - Switched resume-facing labels to language-aware rendering while keeping the application UI in English
      - Replaced the starter README with a brief project-specific guide for the modular resume composer

      Refs: v0.0.4 #3 I3D4 #4 I4D1-I4D6 #6 I6D1-I6D6
  - date: "2026-03-20"
    version: "0.0.3"
    issue: "https://github.com/BallLightningAB/modular-resume-composer/issues/3"
    commit: TBD
    status: completed
    title: "feat(preview): polish PDF layout, references module, and strengths/overlay composition"
    details: |-
      - Added optional `references` module loading, schema support, preset wiring, and example reference content
      - Merged selected overlay content into strengths with a cleaner print-focused layout and dashed divider
      - Reordered presets so `stack` renders after `experience` and before `education` for better flow
      - Improved print styling with keep-together behavior and hid the devtools badge from PDF output
      - Added lightweight character-count hover hints for overlay modules to support modular budgeting
      - Tightened strengths layout with denser two-column print-friendly grid and smaller padding

      Refs: v0.0.3 #3 I3D1-I3D3
  - date: "2026-03-20"
    version: "0.0.2"
    issue: "https://github.com/BallLightningAB/modular-resume-composer/issues/2"
    commit: TBD
    status: completed
    title: "feat(core): implement first working resume composer prototype"
    details: |-
      - Implemented server-side YAML loading with data/private precedence and data/examples fallback
      - Added local-first builder state with saved preset wrapper persistence and last-used state restoration
      - Replaced starter UI with builder, preview, and presets routes backed by TanStack Router search state
      - Added root-level router error and not-found fallbacks plus tolerant block-item parsing for mixed YAML item shapes
      - Expanded YAML version parsing so numeric `version` fields are accepted and normalized to strings
      - Hardened YAML loading so malformed private files fall back to examples instead of crashing route resolution
      - Added semantic resume preview rendering and dedicated /preview and /presets routes
      - Added public example dataset under data/examples for English demo usage
      - Added loader helpers, builder utilities, search parsing, and local storage helpers

      Refs: v0.0.2 #2 I2D1-I2D7
